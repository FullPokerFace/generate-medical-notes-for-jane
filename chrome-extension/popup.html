<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Notes for Jane</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f9fafb;
      color: #111827;
    }

    header {
      background: #4f46e5;
      color: #fff;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
    }

    main {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    label {
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      resize: vertical;
      background: #fff;
    }

    textarea:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79,70,229,0.15);
    }

    button {
      width: 100%;
      padding: 10px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #4338ca; }
    button:disabled { background: #a5b4fc; cursor: not-allowed; }

    #status {
      font-size: 12px;
      text-align: center;
      color: #6b7280;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <header>
    <span>🩺</span>
    <h1>AI Notes for Jane</h1>
  </header>

  <main>
    <div>
      <label for="noteText">Note / Summary</label>
      <textarea id="noteText" placeholder="Paste or type the AI-generated note here…"></textarea>
    </div>

    <button id="fillBtn">Fill Fields on Page</button>
    <div id="status"></div>
  </main>

  <script src="popup.js"></script>
</body>
</html>
